name: Deploy to WP Engine

on:
  push:
    branches:
      - main
      - stg
      - qa
      - dev

concurrency:
  group: wpe-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php-lint:
    name: PHP Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Lint PHP files
        run: |
          echo "Running PHP syntax check..."
          find . -name "*.php" \
            -not -path "./vendor/*" \
            -not -path "./node_modules/*" \
            | xargs -I{} php -l {}
          echo "PHP lint passed."

  deploy:
    name: Deploy → WP Engine
    runs-on: ubuntu-latest
    needs: php-lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve WP Engine environment
        id: env
        run: |
          BRANCH="${GITHUB_REF##*/}"
          case "$BRANCH" in
            main) ENV_NAME="${{ secrets.WPE_PROD_ENV_NAME }}" ;;
            stg)  ENV_NAME="${{ secrets.WPE_STAGING_ENV_NAME }}" ;;
            qa)   ENV_NAME="${{ secrets.WPE_STAGING_ENV_NAME }}" ;;
            dev)  ENV_NAME="${{ secrets.WPE_DEV_ENV_NAME }}" ;;
            *)    echo "Branch $BRANCH has no WP Engine mapping. Skipping."; exit 0 ;;
          esac
          echo "env_name=$ENV_NAME" >> $GITHUB_OUTPUT
          echo "Deploying branch '$BRANCH' → WP Engine env '$ENV_NAME'"

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.WPE_SSHG_KEY_PRIVATE }}" | base64 --decode > ~/.ssh/wpe_deploy_key
          chmod 600 ~/.ssh/wpe_deploy_key
          ssh-keyscan -H git.wpengine.com >> ~/.ssh/known_hosts

      - name: Configure Git
        run: |
          git config --global user.email "deploy@github-actions"
          git config --global user.name "GitHub Actions"

      - name: Push to WP Engine via SSH
        env:
          GIT_SSH_COMMAND: "ssh -i ~/.ssh/wpe_deploy_key -o StrictHostKeyChecking=no"
        run: |
          ENV_NAME="${{ steps.env.outputs.env_name }}"
          if [ -z "$ENV_NAME" ]; then
            echo "No environment resolved — skipping deploy."
            exit 0
          fi
          git remote add wpengine git@git.wpengine.com:production/${ENV_NAME}.git
          git push wpengine HEAD:main --force
          echo "Deploy complete → ${ENV_NAME}"
